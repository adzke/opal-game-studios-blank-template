name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run

      - name: Coverage run
        run: npx vitest run --coverage

      - name: Enforce line coverage >= 90%
        run: |
          node -e 'const fs=require("node:fs"); const summary=JSON.parse(fs.readFileSync("coverage/coverage-summary.json","utf8")); const pct=summary.total.lines.pct; if (pct < 90) { console.error(`Line coverage ${pct}% is below 90%`); process.exit(1); } console.log(`Line coverage ${pct}%`);'

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config -q

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t opal-game-web-smoke .

      - name: Build API image
        run: docker build -f Dockerfile -t opal-game-api-smoke .

