services:
  nginx:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-3000}:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - server

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_ORIGIN: ""
    environment:
      NODE_ENV: production
    depends_on:
      - server

  migrate:
    build:
      context: .
    command: ["bun", "server/migrate.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://template_user:template_pass@db:5432/template_game}
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
    command: ["bun", "server/index.js"]
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgres://template_user:template_pass@db:5432/template_game}
      SUPERTOKENS_CONNECTION_URI: ${SUPERTOKENS_CONNECTION_URI:-http://supertokens:3567}
      API_DOMAIN: ${API_DOMAIN:-http://localhost:3000}
      WEBSITE_DOMAIN: ${WEBSITE_DOMAIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      CORS_ALLOW_ALL: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      supertokens:
        condition: service_started

  supertokens:
    image: supertokens/supertokens-postgresql:latest
    environment:
      POSTGRESQL_CONNECTION_URI: postgresql://template_user:template_pass@db:5432/template_game
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: template_user
      POSTGRES_PASSWORD: template_pass
      POSTGRES_DB: template_game
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U template_user -d template_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
